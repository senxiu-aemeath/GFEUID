<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFEuid - 少女前线2 登录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html {
    height: 100%;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #1a1c24;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1c24 0%, #2d2f3a 50%, #1e2030 100%);
    z-index: -2;
  }
  /* 装饰性对角线 */
  body::after {
    content: "";
    position: fixed;
    top: -50%; left: -20%;
    width: 200%; height: 200%;
    background:
      repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(230,180,80,0.03) 2px, rgba(230,180,80,0.03) 4px),
      repeating-linear-gradient(-45deg, transparent, transparent 3px, rgba(50,150,220,0.02) 3px, rgba(50,150,220,0.02) 6px);
    z-index: -1;
    animation: drift 60s linear infinite;
  }
  @keyframes drift { to { transform: translate(-50px, -50px); } }

  .container {
    background: rgba(30, 32, 40, 0.95);
    border: 1px solid rgba(230, 180, 80, 0.2);
    border-radius: 12px;
    padding: 2rem;
    width: 380px;
    max-width: 95vw;
    box-shadow: 0 0 60px rgba(230, 180, 80, 0.08), 0 8px 32px rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
  }
  .logo {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .logo-icon {
    width: 56px; height: 56px;
    margin: 0 auto 0.5rem;
    background: linear-gradient(135deg, #e6b450, #c89430);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #1a1c24;
    font-weight: bold;
  }
  .logo h2 {
    color: #e6b450;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 2px;
  }
  .logo p {
    color: rgba(255,255,255,0.4);
    font-size: 0.75rem;
    margin-top: 2px;
  }

  .step { display: none; }
  .step.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .step-title {
    color: #fff;
    font-size: 1.05rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .step-title span { color: #e6b450; }

  .options { display: flex; flex-direction: column; gap: 0.6rem; }
  .option-btn {
    display: flex;
    align-items: center;
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #ccc;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.95rem;
    width: 100%;
  }
  .option-btn:hover {
    background: rgba(230, 180, 80, 0.08);
    border-color: rgba(230, 180, 80, 0.3);
    color: #fff;
  }
  .option-btn.selected {
    background: rgba(230, 180, 80, 0.12);
    border-color: #e6b450;
    color: #e6b450;
  }
  .option-icon {
    width: 24px; height: 24px;
    margin-right: 0.75rem;
    font-size: 1.2rem;
    text-align: center;
  }

  .input-group { margin-bottom: 1rem; }
  .input-group label {
    display: block;
    color: rgba(255,255,255,0.6);
    font-size: 0.8rem;
    margin-bottom: 0.35rem;
    font-weight: 500;
  }
  input[type="tel"], input[type="text"], input[type="password"] {
    width: 100%;
    padding: 0.7rem 0.85rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 7px;
    color: #fff;
    font-size: 0.95rem;
    transition: border-color 0.2s;
  }
  input:focus {
    outline: none;
    border-color: #e6b450;
    box-shadow: 0 0 0 2px rgba(230,180,80,0.15);
  }
  .code-row { display: flex; gap: 0.5rem; }
  .code-row input { flex: 1; }

  .btn {
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 7px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #e6b450, #c89430);
    color: #1a1c24;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; filter: none; transform: none; }
  .btn-secondary {
    background: transparent;
    color: rgba(255,255,255,0.5);
    margin-top: 0.5rem;
  }
  .btn-secondary:hover { color: #fff; }
  .btn-code {
    width: auto;
    white-space: nowrap;
    padding: 0.7rem 0.9rem;
    background: rgba(230,180,80,0.15);
    color: #e6b450;
    border: 1px solid rgba(230,180,80,0.3);
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .btn-code:hover { background: rgba(230,180,80,0.25); }
  .btn-code:disabled { opacity: 0.4; cursor: not-allowed; }

  .msg {
    text-align: center;
    font-size: 0.85rem;
    margin-top: 0.75rem;
    min-height: 1.2em;
  }
  .msg.error { color: #d23c32; }
  .msg.success { color: #4caf50; }
  .msg.info { color: rgba(255,255,255,0.5); }

  .user-id {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.7rem;
    margin-top: 1.25rem;
  }

  .back-link {
    display: block;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
    margin-top: 0.75rem;
    cursor: pointer;
  }
  .back-link:hover { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">GF</div>
    <h2>GFEUID</h2>
    <p>少女前线2：追放 · 登录绑定</p>
  </div>

  <!-- Step 1: 选择服务器 -->
  <div class="step active" id="step-server">
    <div class="step-title"><span>1/4</span> 选择服务器</div>
    <div class="options">
      <button class="option-btn" data-value="cn" onclick="selectServer('cn', this)">
        <span class="option-icon">🇨🇳</span> 国服 (CN)
      </button>
      <button class="option-btn" data-value="intl" onclick="selectServer('intl', this)">
        <span class="option-icon">🌏</span> 国际服 (INTL)
      </button>
    </div>
    <div class="msg" id="msg-server"></div>
  </div>

  <!-- Step 2: 选择登录方式 -->
  <div class="step" id="step-method">
    <div class="step-title"><span>2/4</span> 选择登录方式</div>
    <div class="options">
      <button class="option-btn" onclick="selectMethod('sms', this)">
        <span class="option-icon">📱</span> 手机验证码登录
      </button>
      <button class="option-btn" onclick="selectMethod('password', this)">
        <span class="option-icon">🔑</span> 账号密码登录
      </button>
    </div>
    <div class="msg" id="msg-method"></div>
    <div class="back-link" onclick="goBack('server')">← 返回选择服务器</div>
  </div>

  <!-- Step 3a: SMS 验证码 -->
  <div class="step" id="step-sms">
    <div class="step-title"><span>3/4</span> 手机验证码登录</div>
    <div class="input-group">
      <label>手机号</label>
      <input type="tel" id="sms-phone" placeholder="请输入11位手机号" maxlength="11">
    </div>
    <div class="input-group">
      <label>验证码</label>
      <div class="code-row">
        <input type="text" id="sms-code" placeholder="6位验证码" maxlength="6">
        <button class="btn-code" id="btn-send" onclick="sendSms()">获取验证码</button>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-sms-login" onclick="verifySms()">提交</button>
    <div class="msg" id="msg-sms"></div>
    <div class="back-link" onclick="goBack('method')">← 返回选择方式</div>
  </div>

  <!-- Step 3b: 密码登录 -->
  <div class="step" id="step-password">
    <div class="step-title"><span>3/4</span> 账号密码登录</div>
    <div class="input-group">
      <label>账号（手机号或邮箱）</label>
      <input type="text" id="pwd-account" placeholder="请输入手机号或邮箱">
    </div>
    <div class="input-group">
      <label>密码</label>
      <input type="password" id="pwd-password" placeholder="请输入密码">
    </div>
    <button class="btn btn-primary" id="btn-pwd-login" onclick="verifyPassword()">登录</button>
    <div class="msg" id="msg-password"></div>
    <div class="back-link" onclick="goBack('method')">← 返回选择方式</div>
  </div>

  <div class="user-id">你的账号: {{ user_id }}</div>
</div>

<script>
  const TOKEN = "{{ token }}";
  let selectedServer = "";
  let selectedMethod = "";

  async function api(step, extra = {}) {
    try {
      const r = await fetch("/gfe/submit", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({token: TOKEN, step, ...extra})
      });
      return await r.json();
    } catch(e) {
      return {success: false, msg: "网络错误，请重试"};
    }
  }

  function showStep(name) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    const el = document.getElementById("step-" + name);
    if (el) el.classList.add("active");
  }

  function goBack(to) {
    if (to === "server") { showStep("server"); }
    else if (to === "method") { showStep("method"); }
  }

  function setMsg(id, text, type) {
    const el = document.getElementById(id);
    if (el) { el.textContent = text; el.className = "msg " + (type || ""); }
  }

  async function selectServer(srv, btn) {
    document.querySelectorAll("#step-server .option-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedServer = srv;
    setMsg("msg-server", "正在确认...", "info");
    const r = await api("select_server", {server: srv});
    if (r.success) {
      setMsg("msg-server", srv === "cn" ? "已选择国服" : "已选择国际服", "success");
      setTimeout(() => showStep("method"), 200);
    } else {
      setMsg("msg-server", r.msg, "error");
    }
  }

  async function selectMethod(method, btn) {
    document.querySelectorAll("#step-method .option-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedMethod = method;
    const r = await api("select_method", {method});
    if (r.success) {
      if (method === "sms") showStep("sms");
      else showStep("password");
    }
  }

  async function sendSms() {
    const phone = document.getElementById("sms-phone").value.trim();
    if (!/^1[3-9]\d{9}$/.test(phone)) {
      setMsg("msg-sms", "请输入有效的11位手机号", "error");
      return;
    }
    setMsg("msg-sms", "正在发送...", "info");
    const btn = document.getElementById("btn-send");
    btn.disabled = true;
    const r = await api("send_sms", {account: phone});
    if (r.success) {
      setMsg("msg-sms", r.msg, "success");
      let cd = 60;
      const orig = btn.textContent;
      btn.textContent = cd + "s后重试";
      const timer = setInterval(() => {
        cd--;
        btn.textContent = cd + "s后重试";
        if (cd <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = orig; }
      }, 1000);
    } else {
      setMsg("msg-sms", r.msg, "error");
      btn.disabled = false;
    }
  }

  async function verifySms() {
    const code = document.getElementById("sms-code").value.trim();
    if (!code || code.length < 4) {
      setMsg("msg-sms", "请输入验证码", "error");
      return;
    }
    setMsg("msg-sms", "正在验证...", "info");
    const r = await api("verify_sms", {code});
    if (r.success) {
      setMsg("msg-sms", r.msg, "success");
      document.getElementById("btn-sms-login").disabled = true;
      document.getElementById("btn-send").disabled = true;
    } else {
      setMsg("msg-sms", r.msg, "error");
    }
  }

  async function verifyPassword() {
    const account = document.getElementById("pwd-account").value.trim();
    const password = document.getElementById("pwd-password").value;
    if (!account) { setMsg("msg-password", "请输入账号", "error"); return; }
    if (!password) { setMsg("msg-password", "请输入密码", "error"); return; }
    setMsg("msg-password", "正在登录...", "info");
    const r = await api("verify_password", {account, password});
    if (r.success) {
      setMsg("msg-password", r.msg, "success");
      document.getElementById("btn-pwd-login").disabled = true;
    } else {
      setMsg("msg-password", r.msg, "error");
    }
  }
</script>
</body>
</html>
